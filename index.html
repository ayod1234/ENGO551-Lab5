<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ayooluwa - Home</title>
    <link rel="stylesheet" type="text/css" href="mystyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body class="bg-dark text-white">
    
    <main class="container mt-5">
    <h2>Broker Configuration</h2>
    <div class="mb-3">
        <input type="text" id="host" class="form-control mb-2" placeholder="Broker Host (e.g., broker.hivemq.com)">
        <input type="number" id="port" class="form-control mb-2" placeholder="Port (e.g., 8081)">
        
        <button id="startBtn" class="btn btn-success" onclick="connect()">Start Connection</button>
        <button id="endBtn" class="btn btn-danger" onclick="disconnect()" disabled>End Connection</button>
    </div>
    
    <div id="status" class="alert alert-secondary mt-3">Status: Disconnected</div>
    </main>

    <footer class="container mt-5 pt-3 border-top">
        <p>Author: Ayooluwa Durojaiye</p>
        <p>Socials: <a class="text-info" href="https://www.linkedin.com/in/ayooluwa-durojaiye-058597245/">Linkedin</a></p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
